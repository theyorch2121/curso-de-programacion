#Ejercicio15 HTML

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reserva de Vuelo</title>
</head>
<body>

    <h2>Reserva de Vuelo</h2>

    <form>
        
        <label for="email">Email del pasajero:</label><br>
        <input type="email" id="email" name="email" required>
        
        <br><br>

        
        <label for="fecha">Fecha de viaje:</label><br>
        <input type="date" id="fecha" name="fecha" min="2026-05-07" required>

        <br><br>

        
        <label for="cantidad">Cantidad de pasajeros (1-5):</label><br>
        <input type="number" id="cantidad" name="cantidad" min="1" max="5" required>

        <br><br>

        <button type="submit">Reservar ahora</button>
    </form>

</body>
</html>
