<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Básico</title>
</head>
<body>

    <h2>Inventario</h2>

    <table border="1">
        <!-- Título que ocupa las 4 columnas -->
        <tr>
            <th colspan="4">Lista de Productos</th>
        </tr>

        <!-- Encabezados -->
        <tr>
            <th>Categoría</th>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio</th>
        </tr>

        <!-- Bloque de Electrónica -->
        <tr>
            <td rowspan="2">Computación</td>
            <td>Mouse Gamer</td>
            <td>10</td>
            <td>$25</td>
        </tr>
        <tr>
            <td>Teclado Mecánico</td>
            <td>5</td>
            <td>$45</td>
        </tr>

        <!-- Bloque de Motor -->
        <tr>
            <td rowspan="2">Motos</td>
            <td>Aceite 4T</td>
            <td>20</td>
            <td>$10</td>
        </tr>
        <tr>
            <td>Bujía</td>
            <td>50</td>
            <td>$3</td>
        </tr>
    </table>

</body>
</html>
